<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  {% feed_meta %}
  {% seo %}
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; line-height: 1.7; max-width: 800px; margin: 0 auto; padding: 2rem; }
    h1, h2 { font-weight: 900; color: #1a1a1a; letter-spacing: -0.02em; }
    h1 { font-size: 3rem; margin-bottom: 0.5rem; }
    h2 { font-size: 2rem; border-bottom: 3px solid #007acc; padding-bottom: 0.5rem; }
    .post-list { list-style: none; padding: 0; }
    .post-list li { margin-bottom: 2rem; border-left: 4px solid #007acc; padding-left: 1.5rem; }
    .post-title { font-size: 1.8rem; font-weight: 800; margin: 0 0 0.5rem 0; }
    .post-meta { color: #666; font-size: 0.95rem; margin-bottom: 1rem; }
    .post-excerpt { font-size: 1.1rem; }
    nav { margin-bottom: 3rem; }
    nav a { font-weight: 600; margin-right: 1.5rem; color: #007acc; text-decoration: none; }
    footer { text-align: center; margin-top: 4rem; padding-top: 2rem; border-top: 1px solid #eee; color: #888; }
    @media (max-width: 768px) { body { padding: 1rem; } h1 { font-size: 2.2rem; } }
  </style>
</head>
<body>
  <header>
    <h1><a href="{{ '/' | relative_url }}" style="color: inherit; text-decoration: none;">{{ site.title }}</a></h1>
    <p style="margin: 0 0 2rem 0; font-size: 1.2rem; color: #666;">{{ site.description }}</p>
    <nav>
      <a href="{{ '/' | relative_url }}">All Essays</a>
      <a href="{{ '/tags/' | relative_url }}">By Tags</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    &copy; {{ 'now' | date: '%Y' }} Kartik Neti. Built with <strong>Jekyll</strong>.
  </footer>
</body>
</html>
