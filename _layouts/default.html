<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
  {% feed_meta %}
  {% seo %}
 :root {
  --bg-primary: #fefefe;
  --bg-secondary: #f9fafb;
  --text-primary: #111827;
  --text-secondary: #6b7280;
  --accent: #0f766e;      /* Subtle teal */
  --accent-hover: #115e59;
  --border: #e5e7eb;
  --shadow: 0 1px 3px 0 rgba(0, 0,0, 0.1), 0 1px 2px 0 rgba(0, 0,0, 0.06);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #111827;
    --bg-secondary: #1f2937;
    --text-primary: #f9fafb;
    --text-secondary: #d1d5db;
    --accent: #34d399;
    --accent-hover: #10b981;
    --border: #374151;
  }
}
* { box-sizing: border-box; }
body { 
  font-family: 'Inter', system-ui, sans-serif; 
  line-height: 1.7; 
  max-width: 850px; margin: 0 auto; padding: 2.5rem 1.25rem; 
  background: var(--bg-primary); color: var(--text-primary);
}
h1, h2, h3 { 
  font-weight: 700; 
  color: var(--text-primary);
  letter-spacing: -0.02em;
}
h1 { font-size: clamp(2.25rem, 5vw, 3.5rem); margin-bottom: 1rem; }
h2 { font-size: clamp(1.6rem, 4vw, 2.25rem); margin: 2.5rem 0 1rem 0; border-left: 4px solid var(--accent); padding-left: 1rem; }
.post-list { list-style: none; padding: 0; }
.post-list li { 
  background: var(--bg-secondary); 
  border: 1px solid var(--border); 
  border-radius: 8px; 
  padding: 1.75rem; 
  margin-bottom: 1.75rem;
}
.post-title { 
  font-size: 1.4rem; font-weight: 700; margin: 0 0 0.25rem 0; color: var(--text-primary);
}
.post-meta { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem; }
.post-excerpt { color: var(--text-primary); line-height: 1.6; }
nav { 
  margin-bottom: 3rem; padding: 1.25rem 0; border-bottom: 1px solid var(--border);
}
nav a { 
  font-weight: 600; margin-right: 1.75rem; color: var(--accent); 
  text-decoration: none; padding-bottom: 0.25rem; 
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
nav a:hover { color: var(--accent-hover); border-color: var(--accent-hover); }
footer { 
  text-align: center; margin-top: 5rem; padding-top: 2.5rem; 
  border-top: 1px solid var(--border); color: var(--text-secondary); 
  font-size: 0.9rem;
}
a { color: var(--accent); }
a:hover { text-decoration: underline; }
@media (max-width: 768px) { 
  body { padding: 2rem 1rem; } 
  nav a { display: inline-block; margin: 0.5rem 1rem 0.5rem 0; }
  .post-list li { padding: 1.5rem; }
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

</head>
<body>
  <header>
    <h1><a href="{{ '/' | relative_url }}" style="color: inherit; text-decoration: none;">{{ site.title }}</a></h1>
    <p style="margin: 0 0 2rem 0; font-size: 1.2rem; color: #666;">{{ site.description }}</p>
    <nav>
      <a href="{{ '/' | relative_url }}">All Essays</a>
      <a href="{{ '/tags/' | relative_url }}">By Tags</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    &copy; {{ 'now' | date: '%Y' }} Kartik Neti. Built with <strong>Jekyll</strong>.
  </footer>
</body>
</html>
