<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
  /* Add to existing :root */
--ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);

/* Animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.fade-in-up { 
  opacity: 0; 
  animation: fadeInUp 0.8s var(--ease) forwards; 
}
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.3s; }
.post-list > li { 
  /* existing + */
  opacity: 0; 
  animation: fadeInUp 0.6s var(--ease) forwards; 
}
.post-list > li:nth-child(1) { animation-delay: 0.1s; }
.post-list > li:nth-child(2) { animation-delay: 0.2s; }
.post-list > li:nth-child(3) { animation-delay: 0.3s; }
.post-list > li:hover { 
  /* existing + */
  animation: float 2s var(--ease) infinite; 
  transform: translateY(-4px);
}
nav a { 
  /* existing + */
  position: relative; 
}
nav a::after {
  content: ''; 
  position: absolute; bottom: 0; left: 0; 
  width: 0; height: 2px; background: var(--accent); 
  transition: width 0.3s var(--ease);
}
nav a:hover::after { width: 100%; }

</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

</head>
<body>
  <header>
    <h1><a href="{{ '/' | relative_url }}" style="color: inherit; text-decoration: none;">{{ site.title }}</a></h1>
    <p style="margin: 0 0 2rem 0; font-size: 1.2rem; color: #666;">{{ site.description }}</p>
    <nav>
      <a href="{{ '/' | relative_url }}">All Essays</a>
      <a href="{{ '/tags/' | relative_url }}">By Tags</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    &copy; {{ 'now' | date: '%Y' }} Kartik Neti. Built with <strong>Jekyll</strong>.
  </footer>
  <script>
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('fade-in-up');
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.post-list > li, h1, h2, nav').forEach(el => {
  observer.observe(el);
});

// Parallax header on scroll
window.addEventListener('scroll', () => {
  const scrolled = window.pageYOffset;
  const header = document.querySelector('header');
  if (header) header.style.transform = `translateY(${scrolled * 0.4}px)`;
});
</script>

</body>
</html>
