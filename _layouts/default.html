<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    :root {
      --bg: #FAFAFA;
      --text: #050505;
      --border: #111111;
      --muted: #666666;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #050505;
        --text: #F5F5F5;
        --border: #EEEEEE;
        --muted: #A0A0A0;
      }
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
      line-height: 1.6; 
      color: var(--text); 
      background: var(--bg); 
      -webkit-font-smoothing: antialiased;
    }

    main { max-width: 800px; margin: 0 auto; padding: 6rem 2rem; }
    
    /* Header - Architectural and Massive */
    header { margin-bottom: 4rem; }
    
    h1.site-title { 
      font-size: clamp(3rem, 10vw, 6.5rem); 
      font-weight: 900; 
      letter-spacing: -0.05em; 
      text-transform: uppercase; 
      line-height: 0.9;
      border-bottom: 8px solid var(--text);
      padding-bottom: 1.5rem;
      margin-bottom: 1.5rem;
    }
    h1.site-title a { color: var(--text); text-decoration: none; }
    
    /* Navigation - Serious and crisp */
    nav { 
      display: flex; gap: 2rem; 
      font-weight: 700; 
      text-transform: uppercase; 
      letter-spacing: 1px; 
      font-size: 0.85rem; 
    }
    nav a { 
      color: var(--text); 
      text-decoration: none; 
      opacity: 0.5; 
      transition: opacity 0.2s ease, transform 0.2s ease; 
    }
    nav a:hover { opacity: 1; transform: translateX(2px); }
    
    /* Post List - Sharp, no boxes, just strong dividing lines */
    .post-list { list-style: none; padding: 0; margin-top: 4rem; }
    .post-list > li { 
      border-top: 2px solid var(--border);
      padding: 3rem 0;
      opacity: 0; 
      transform: translateY(20px);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), padding-left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    /* Snappy hover effect - no floating, just a sharp indent */
    .post-list > li:hover { padding-left: 1.5rem; }
    
    .post-title { 
      font-size: clamp(2rem, 5vw, 3rem); 
      font-weight: 800; 
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1rem; 
    }
    .post-title a { color: var(--text); text-decoration: none; }
    
    .post-meta { 
      font-family: "Courier New", Courier, monospace; 
      text-transform: uppercase; 
      font-size: 0.85rem; 
      color: var(--muted); 
      margin-bottom: 1.5rem;
      font-weight: 600;
    }
    
    .post-excerpt { 
      font-size: 1.25rem; 
      max-width: 650px; 
      color: var(--text); 
      opacity: 0.85; 
    }
    
    /* Essay Reading Experience */
    h1, h2, h3 { font-weight: 800; letter-spacing: -0.03em; margin: 0; }
    h2 { 
      font-size: 2.5rem; 
      margin: 4rem 0 1.5rem; 
      border-bottom: 2px solid var(--border); 
      padding-bottom: 0.5rem; 
    }
    p { font-size: 1.2rem; margin-bottom: 2rem; color: var(--text); opacity: 0.9; }
    a { color: var(--text); font-weight: 700; text-decoration: underline; text-decoration-thickness: 2px; }
    a:hover { background: var(--text); color: var(--bg); }
    
    /* Snappy Reveal Animation */
    .reveal { animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideUp { 
      to { opacity: 1; transform: translateY(0); } 
    }
    
    footer { 
      margin-top: 6rem; 
      padding-top: 2rem; 
      border-top: 8px solid var(--border); 
      font-family: "Courier New", Courier, monospace; 
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <main>
    <header class="reveal">
      <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <nav>
        <a href="{{ '/' | relative_url }}">Essays</a>
        <a href="{{ '/tags/' | relative_url }}">Tags</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
      </nav>
    </header>

    <div class="reveal" style="animation-delay: 0.1s;">
      {{ content }}
    </div>

    <footer class="reveal" style="animation-delay: 0.2s;">
      &copy; {{ 'now' | date: '%Y' }} Kartik Neti. All rights reserved.
    </footer>
  </main>

  <script>
    // Sharp, professional scroll reveals
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('reveal');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.05 });

    document.querySelectorAll('.post-list > li, h2, p').forEach((el, i) => {
      el.style.animationDelay = `${i * 0.05}s`; // Staggered fast reveals
      observer.observe(el);
    });
  </script>
</body>
</html>
