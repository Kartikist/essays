<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  {% feed_meta %}
  {% seo %}
  <style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f8fafc;
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --border: #e2e8f0;
    --shadow: 0 4px 6px -1px rgba(0, 0,0, 0.1), 0 2px 4px -1px rgba(0, 0,0, 0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #60a5fa;
    }
  }
  * { box-sizing: border-box; }
  body { 
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
    line-height: 1.7; 
    max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; 
    background: var(--bg-primary); color: var(--text-primary); 
    transition: background 0.3s, color 0.3s;
  }
  h1, h2, h3 { 
    font-weight: 800; 
    letter-spacing: -0.025em; 
    background: linear-gradient(135deg, var(--accent), #1e40af); 
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent; 
    background-clip: text;
  }
  h1 { font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 0.5rem; }
  h2 { font-size: clamp(1.75rem, 4vw, 2.5rem); border-bottom: 2px solid var(--accent); padding-bottom: 0.75rem; margin-bottom: 1.5rem; }
  .post-list { list-style: none; padding: 0; }
  .post-list li { 
    background: var(--bg-secondary); 
    border-radius: 12px; 
    padding: 2rem; 
    margin-bottom: 1.5rem; 
    box-shadow: var(--shadow); 
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .post-list li:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
  .post-title { 
    font-size: 1.6rem; font-weight: 800; margin: 0 0 0.5rem 0; 
    display: block; color: var(--text-primary);
  }
  .post-meta { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 1rem; }
  .post-excerpt { font-size: 1.1rem; line-height: 1.6; }
  nav { 
    margin-bottom: 3rem; padding: 1rem 0; border-bottom: 1px solid var(--border);
  }
  nav a { 
    font-weight: 600; margin-right: 2rem; color: var(--accent); 
    text-decoration: none; padding: 0.5rem 1rem; 
    border-radius: 8px; transition: all 0.2s;
  }
  nav a:hover { background: var(--accent); color: white; }
  footer { 
    text-align: center; margin-top: 4rem; padding-top: 2rem; 
    border-top: 1px solid var(--border); color: var(--text-secondary); 
    font-size: 0.9rem;
  }
  ul:not(.post-list) { padding-left: 1.5rem; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  @media (max-width: 768px) { 
    body { padding: 1.5rem 1rem; } 
    nav a { display: block; margin: 0.5rem 0; }
  }
</style>

</head>
<body>
  <header>
    <h1><a href="{{ '/' | relative_url }}" style="color: inherit; text-decoration: none;">{{ site.title }}</a></h1>
    <p style="margin: 0 0 2rem 0; font-size: 1.2rem; color: #666;">{{ site.description }}</p>
    <nav>
      <a href="{{ '/' | relative_url }}">All Essays</a>
      <a href="{{ '/tags/' | relative_url }}">By Tags</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    &copy; {{ 'now' | date: '%Y' }} Kartik Neti. Built with <strong>Jekyll</strong>.
  </footer>
</body>
</html>
