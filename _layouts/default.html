<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
  :root {
  --bg: #ffffff;
  --bg-card: #fafbfc;
  --text-main: #0f1419;
  --text-dim: #64748b;
  --accent: #1e293b;
  --border-color: #e2e8f0;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0a0e15;
    --bg-card: #111827;
    --text-main: #f8fafc;
    --text-dim: #9ca3af;
    --accent: #e5e7eb;
  }
}
* { box-sizing: border-box; margin: 0; }
body { 
  font-family: ui-sans-serif, system-ui, sans-serif; 
  line-height: 1.75; 
  color: var(--text-main);
  background: var(--bg);
}
main { max-width: 768px; margin: 0 auto; padding: 3rem 1.5rem; }
header { margin-bottom: 4rem; text-align: center; }
h1.site-title { 
  font-size: clamp(2.25rem, 6vw, 4rem); 
  font-weight: 900; 
  color: var(--text-main);
  margin-bottom: 0.5rem;
  letter-spacing: -0.025em;
}
.site-desc { 
  font-size: 1.125rem; 
  color: var(--text-dim); 
  max-width: 500px; 
  margin: 0 auto 3rem;
}
nav { 
  display: flex; gap: 1.5rem; 
  justify-content: center; 
  flex-wrap: wrap; 
  margin-bottom: 3rem;
}
nav a { 
  font-weight: 600; 
  color: var(--accent); 
  text-decoration: none; 
  padding: 0.5rem 1rem; 
  border-radius: 0.5rem;
  transition: background 200ms;
}
nav a:hover { background: var(--bg-card); }
.post-list { list-style: none; padding: 0; }
.post-list > li { 
  margin-bottom: 2.5rem; 
  background: var(--bg-card); 
  border-radius: 0.75rem; 
  overflow: hidden; 
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border-color);
  transition: box-shadow 200ms;
}
.post-list > li:hover { box-shadow: var(--shadow-md), 0 0 0 1px var(--accent); }
.post-header { padding: 2rem 2.25rem 1.5rem; }
.post-title { 
  font-size: 1.75rem; 
  font-weight: 800; 
  line-height: 1.3; 
  margin-bottom: 0.5rem;
  color: var(--text-main);
}
.post-meta { 
  color: var(--text-dim); 
  font-size: 0.95rem; 
  margin-bottom: 1rem;
}
.post-excerpt { 
  padding: 0 2.25rem 2rem; 
  font-size: 1.1rem; 
  color: var(--text-main);
}
.post-link { display: block; }
h1, h2, h3 { 
  font-weight: 800; 
  color: var(--text-main);
  margin-top: 0;
}
h2 { 
  font-size: 1.875rem; 
  margin: 3rem 0 1.5rem; 
  padding-top: 1rem;
  border-top: 1px solid var(--border-color);
}
footer { 
  text-align: center; 
  padding: 4rem 0 2rem; 
  color: var(--text-dim); 
  border-top: 1px solid var(--border-color);
  font-size: 0.875rem;
}
@media (max-width: 640px) {
  main { padding: 2rem 1rem; }
  .post-header, .post-excerpt { padding-left: 1.5rem; padding-right: 1.5rem; }
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

</head>
<body>
  <header>
    <h1><a href="{{ '/' | relative_url }}" style="color: inherit; text-decoration: none;">{{ site.title }}</a></h1>
    <p style="margin: 0 0 2rem 0; font-size: 1.2rem; color: #666;">{{ site.description }}</p>
    <nav>
      <a href="{{ '/' | relative_url }}">All Essays</a>
      <a href="{{ '/tags/' | relative_url }}">By Tags</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    &copy; {{ 'now' | date: '%Y' }} Kartik Neti. Built with <strong>Jekyll</strong>.
  </footer>
</body>
</html>
