<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    :root {
      --bg: #ffffff; 
      --bg-card: #fafbfc; 
      --text-main: #0f1419;
      --text-dim: #64748b; 
      --accent: #1e293b; 
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0e15; 
        --bg-card: #111827; 
        --text-main: #f8fafc;
        --text-dim: #9ca3af; 
        --accent: #e5e7eb; 
        --border: #374151;
      }
    }
    * { box-sizing: border-box; margin: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.75; color: var(--text-main); background: var(--bg); }
    main { max-width: 768px; margin: 0 auto; padding: 3rem 1.5rem; }
    header { margin-bottom: 4rem; text-align: center; transition: transform 0.1s; }
    h1.site-title { font-size: clamp(2.25rem, 6vw, 4rem); font-weight: 900; margin-bottom: 0.5rem; letter-spacing: -0.03em; }
    .site-title a { color: var(--text-main); text-decoration: none; }
    
    /* Navigation */
    nav { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 3rem; }
    nav a { font-weight: 600; color: var(--text-dim); text-decoration: none; padding: 0.5rem; position: relative; }
    nav a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px; background: var(--text-main); transition: width 0.3s var(--ease); }
    nav a:hover { color: var(--text-main); }
    nav a:hover::after { width: 100%; }
    
    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .fade-in-up { opacity: 0; animation: fadeInUp 0.8s var(--ease) forwards; }
    
    /* Lists and Cards */
    .post-list { list-style: none; padding: 0; }
    .post-list > li { 
      margin-bottom: 2.5rem; background: var(--bg-card); border-radius: 0.75rem; 
      padding: 2rem; box-shadow: var(--shadow); border: 1px solid var(--border);
      opacity: 0; animation: fadeInUp 0.6s var(--ease) forwards;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .post-list > li:nth-child(1) { animation-delay: 0.1s; }
    .post-list > li:nth-child(2) { animation-delay: 0.2s; }
    .post-list > li:hover { transform: translateY(-4px); animation: float 3s ease-in-out infinite; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    
    .post-title { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    .post-title a { color: var(--text-main); text-decoration: none; }
    .post-meta { color: var(--text-dim); font-size: 0.95rem; margin-bottom: 1rem; }
    
    /* General Typography */
    h1, h2, h3 { font-weight: 800; color: var(--text-main); }
    h2 { font-size: 1.875rem; margin: 3rem 0 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    a { color: #3b82f6; }
    footer { text-align: center; padding: 4rem 0 2rem; color: var(--text-dim); border-top: 1px solid var(--border); font-size: 0.875rem; }
  </style>
</head>
<body>
  <main>
    <header class="fade-in-up">
      <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <nav>
        <a href="{{ '/' | relative_url }}">All Essays</a>
        <a href="{{ '/tags/' | relative_url }}">By Tags</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
      </nav>
    </header>

    <div class="fade-in-up" style="animation-delay: 0.2s;">
      {{ content }}
    </div>

    <footer class="fade-in-up" style="animation-delay: 0.4s;">
      &copy; {{ 'now' | date: '%Y' }} Kartik Neti. Built for bold ideas.
    </footer>
  </main>

  <script>
    // Reveal text as you scroll down
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('fade-in-up');
          entry.target.style.animationDelay = '0s'; // reset delay for scroll
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('h2, p, .post-list > li').forEach(el => {
      observer.observe(el);
    });

    // Subtle parallax header on scroll
    window.addEventListener('scroll', () => {
      const scrolled = window.pageYOffset;
      const header = document.querySelector('header');
      if (header) header.style.transform = `translateY(${scrolled * 0.2}px)`;
    });
  </script>
</body>
</html>
